
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicación - SilkThoughts</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>SilkThoughts</h1>
    <nav id="main-nav"></nav>
  </header>

  <main class="detalle-container">
    <article id="detalle-post">
      <p>Cargando...</p>
    </article>

    <section class="comentarios">
      <h2>Comentarios</h2>

      <form id="form-comentario">
        <textarea
          id="contenido-comentario"
          placeholder="Escribe un comentario de apoyo..."
          required
          rows="3"
        ></textarea>
        <button type="submit">Comentar</button>
      </form>

      <p id="aviso-login-comentario" style="display: none;">
        Debes <a href="login.html">Iniciar sesión</a> o <a href="registro.html">Registrarte</a> para comentar.
      </p>

      <p id="mensaje-comentario" role="alert"></p>
      <div id="lista-comentarios"></div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/publicacion.js"></script>
</body>
</html>
